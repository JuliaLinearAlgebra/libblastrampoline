name: CI

on:
  push:
    branches:
      - main
    tags: ['*']
  pull_request:
  workflow_dispatch:

concurrency:
  # Cancel in-progress runs for the same PR / branch, but never on `main`.
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

permissions:
  contents: read

jobs:
  test:
    name: ${{ matrix.backend }} / ${{ matrix.os }} / julia ${{ matrix.julia-version }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        # Each BLAS/LAPACK backend is tested in its own job (and its own process, with
        # its own `test/backends/<backend>/Project.toml`) so that only a single set of
        # BLAS/LAPACK libraries is ever loaded at once.  We enumerate the exact
        # backend × OS × julia combinations as `include` entries so that each combo is
        # opt-in (no accidental jobs on platforms a backend can't run on).
        #
        # Platform notes:
        #   - mkl:        x86_64 only (no ARM build).
        #   - accelerate: macOS only (system framework).
        #   - blas64:     Linux only (Debian libblas64-dev / liblapack64-dev).
        #   - blis:       Linux + macOS (no Windows build exercised here).
        #   - refblas:    omitted on Windows (reference BLAS DLLs not yet resolvable there).
        include:
          # openblas — everywhere
          - {backend: openblas, os: ubuntu-latest,    julia-version: '1.10'}
          - {backend: openblas, os: ubuntu-latest,    julia-version: 'nightly'}
          - {backend: openblas, os: ubuntu-24.04-arm, julia-version: '1.10'}
          - {backend: openblas, os: ubuntu-24.04-arm, julia-version: 'nightly'}
          - {backend: openblas, os: windows-latest,   julia-version: '1.10'}
          - {backend: openblas, os: windows-latest,   julia-version: 'nightly'}
          - {backend: openblas, os: macos-latest,     julia-version: '1.10'}
          - {backend: openblas, os: macos-latest,     julia-version: 'nightly'}
          - {backend: openblas, os: macos-15-intel,   julia-version: '1.10'}
          - {backend: openblas, os: macos-15-intel,   julia-version: 'nightly'}
          # mkl — x86_64 only
          - {backend: mkl, os: ubuntu-latest,  julia-version: '1.10'}
          - {backend: mkl, os: ubuntu-latest,  julia-version: 'nightly'}
          - {backend: mkl, os: windows-latest, julia-version: '1.10'}
          - {backend: mkl, os: windows-latest, julia-version: 'nightly'}
          - {backend: mkl, os: macos-15-intel, julia-version: '1.10'}
          - {backend: mkl, os: macos-15-intel, julia-version: 'nightly'}
          # refblas — LP64 reference BLAS/LAPACK (no Windows for now)
          - {backend: refblas, os: ubuntu-latest,    julia-version: '1.10'}
          - {backend: refblas, os: ubuntu-latest,    julia-version: 'nightly'}
          - {backend: refblas, os: ubuntu-24.04-arm, julia-version: '1.10'}
          - {backend: refblas, os: ubuntu-24.04-arm, julia-version: 'nightly'}
          - {backend: refblas, os: macos-latest,     julia-version: '1.10'}
          - {backend: refblas, os: macos-latest,     julia-version: 'nightly'}
          - {backend: refblas, os: macos-15-intel,   julia-version: '1.10'}
          - {backend: refblas, os: macos-15-intel,   julia-version: 'nightly'}
          # blis — Linux + macOS
          - {backend: blis, os: ubuntu-latest,    julia-version: '1.10'}
          - {backend: blis, os: ubuntu-latest,    julia-version: 'nightly'}
          - {backend: blis, os: ubuntu-24.04-arm, julia-version: '1.10'}
          - {backend: blis, os: ubuntu-24.04-arm, julia-version: 'nightly'}
          - {backend: blis, os: macos-latest,     julia-version: '1.10'}
          - {backend: blis, os: macos-latest,     julia-version: 'nightly'}
          - {backend: blis, os: macos-15-intel,   julia-version: '1.10'}
          - {backend: blis, os: macos-15-intel,   julia-version: 'nightly'}
          # blas64 — Linux only (system ILP64 reference BLAS/LAPACK)
          - {backend: blas64, os: ubuntu-latest,    julia-version: '1.10'}
          - {backend: blas64, os: ubuntu-latest,    julia-version: 'nightly'}
          - {backend: blas64, os: ubuntu-24.04-arm, julia-version: '1.10'}
          - {backend: blas64, os: ubuntu-24.04-arm, julia-version: 'nightly'}
          # accelerate — macOS only
          - {backend: accelerate, os: macos-latest,   julia-version: '1.10'}
          - {backend: accelerate, os: macos-latest,   julia-version: 'nightly'}
          - {backend: accelerate, os: macos-15-intel, julia-version: '1.10'}
          - {backend: accelerate, os: macos-15-intel, julia-version: 'nightly'}
          # direct — in-process LBT API tests, everywhere
          - {backend: direct, os: ubuntu-latest,    julia-version: '1.10'}
          - {backend: direct, os: ubuntu-latest,    julia-version: 'nightly'}
          - {backend: direct, os: ubuntu-24.04-arm, julia-version: '1.10'}
          - {backend: direct, os: ubuntu-24.04-arm, julia-version: 'nightly'}
          - {backend: direct, os: windows-latest,   julia-version: '1.10'}
          - {backend: direct, os: windows-latest,   julia-version: 'nightly'}
          - {backend: direct, os: macos-latest,     julia-version: '1.10'}
          - {backend: direct, os: macos-latest,     julia-version: 'nightly'}
          - {backend: direct, os: macos-15-intel,   julia-version: '1.10'}
          - {backend: direct, os: macos-15-intel,   julia-version: 'nightly'}
    steps:
      - uses: actions/checkout@v4

      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia-version }}
          arch: ${{ (matrix.os == 'ubuntu-24.04-arm' || matrix.os == 'macos-latest') && 'aarch64' || 'x64' }}

      - uses: julia-actions/cache@v2

      # The `blas64` backend tests against a system-provided ILP64 reference BLAS/LAPACK.
      - name: Install system libblas64 / liblapack64 (Debian)
        if: matrix.backend == 'blas64'
        run: |
          sudo apt-get update
          sudo apt-get install -y libblas64-dev liblapack64-dev

      # Windows needs a MinGW toolchain (gcc + make) to build the C test programs and
      # libblastrampoline itself.
      - uses: msys2/setup-msys2@v2
        id: msys2
        if: runner.os == 'Windows'
        with:
          msystem: MINGW64
          path-type: inherit
          install: >-
            make
            mingw-w64-x86_64-gcc
      - name: Add MSYS2 tools to PATH (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Add-Content -Path $env:GITHUB_PATH -Value "${{ steps.msys2.outputs.msys2-location }}\mingw64\bin"
          Add-Content -Path $env:GITHUB_PATH -Value "${{ steps.msys2.outputs.msys2-location }}\usr\bin"

      - name: Instantiate ${{ matrix.backend }} project
        run: julia --project=test/backends/${{ matrix.backend }} -e 'import Pkg; Pkg.instantiate()'

      - name: Run ${{ matrix.backend }} tests
        run: julia --project=test/backends/${{ matrix.backend }} test/backends/${{ matrix.backend }}/runtests.jl

  func-list-idempotency:
    name: func_list idempotency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - name: Regenerate func_list and check for diff
        run: |
          cd ext/gensymbol
          ./generate_func_list.sh
          git diff --exit-code
